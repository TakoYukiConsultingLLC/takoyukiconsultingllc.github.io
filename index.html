<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TakoYuki Consulting LLC</title>

<!-- Professional Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #f5f7fa 0%, #e8eef5 100%);
    color: #2c3e50;
    line-height: 1.8;
    overflow-x: hidden;
}

header {
    background: linear-gradient(135deg, #0b1f3a 0%, #1a3a52 100%);
    padding: 20px 50px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    position: sticky;
    top: 0;
    z-index: 1000;
}

.header-content {
    display: flex;
    align-items: center;
    gap: 15px;
}

header img {
    height: 70px;
    width: auto;
    object-fit: contain;
    filter: drop-shadow(0 4px 8px rgba(255,215,0,0.3));
}

header h1 {
    color: #ffd700;
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 1px;
}

nav {
    display: flex;
    gap: 0;
}

nav a {
    color: white;
    padding: 10px 20px;
    text-decoration: none;
    font-weight: 600;
    font-size: 15px;
    transition: all 0.3s ease;
    position: relative;
}

nav a:hover {
    color: #ffd700;
    background: rgba(255,215,0,0.1);
    border-radius: 5px;
}

nav a::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 0;
    height: 3px;
    background: #ffd700;
    transition: all 0.3s ease;
    transform: translateX(-50%);
}

nav a:hover::after {
    width: 80%;
}

.hero {
    position: relative;
    background: linear-gradient(135deg, rgba(11,31,58,0.92), rgba(26,58,82,0.92)),
                url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab') center/cover no-repeat;
    color: white;
    text-align: center;
    padding: 150px 30px;
    overflow: hidden;
}

/* LOGO WATERMARK */
.hero::after {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    width: 700px;
    height: 700px;
    background: url('tako-yuki-logo.png') no-repeat center;
    background-size: contain;
    opacity: 0.06;
    transform: translate(-50%, -50%);
    z-index: 1;
}

.hero::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.3) 100%);
    pointer-events: none;
}

.hero-content {
    position: relative;
    z-index: 2;
    max-width: 900px;
    margin: 0 auto;
}

.hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 56px;
    font-weight: 800;
    margin-bottom: 15px;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
    letter-spacing: 2px;
}

.hero p {
    font-size: 20px;
    margin-bottom: 30px;
    font-weight: 300;
    letter-spacing: 1px;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.3);
}

.btn {
    background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
    color: #0b1f3a;
    padding: 16px 40px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 700;
    display: inline-block;
    transition: all 0.3s ease;
    cursor: pointer;
    border: none;
    font-size: 16px;
    box-shadow: 0 8px 20px rgba(255,215,0,0.3);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 30px rgba(255,215,0,0.5);
}

.btn:active {
    transform: translateY(-1px);
}

.section {
    padding: 100px 50px;
    background: white;
    margin: 30px auto;
    max-width: 1200px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.08);
}

.section h2 {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 800;
    color: #0b1f3a;
    margin-bottom: 60px;
    text-align: center;
    position: relative;
    padding-bottom: 30px;
}

.section h2::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 4px;
    background: linear-gradient(90deg, transparent, #ffd700, transparent);
    border-radius: 2px;
}

.about-content {
    display: grid;
    grid-template-columns: 1fr 1.2fr;
    gap: 60px;
    align-items: center;
}

.about-image {
    position: relative;
}

.about-image img {
    width: 100%;
    max-width: 400px;
    height: auto;
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(11,31,58,0.2);
    border: 5px solid #ffd700;
    object-fit: cover;
    transition: transform 0.3s ease;
}

.about-image img:hover {
    transform: scale(1.03);
}

.about-text h3 {
    color: #ffd700;
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 20px;
}

.about-text p {
    color: #555;
    margin-bottom: 18px;
    font-size: 16px;
    line-height: 1.9;
    font-weight: 400;
}

.about-text strong {
    color: #0b1f3a;
    font-weight: 700;
}
